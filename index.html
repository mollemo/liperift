<html lang="fi">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liperin leiri 27–31.7</title>
<style>
  :root {
    --red: #CC1F1F;
    --darkred: #991515;
    --green: #1A7A40;
    --navy: #1A1A44;
    --bg: #F7F2F2;
    --card: #FFFFFF;
    --text: #1A1A2E;
    --sub: #777;
    --border: #EADADA;
    --now-bg: #FFF7E0;
    --now-border: #E8A800;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding-bottom: 40px;
  }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  header {
    background: var(--red);
    color: #fff;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header .logo {
    width: 52px;
    height: 52px;
    min-width: 52px;
    border-radius: 50%;
    box-shadow: 0 1px 4px rgba(0,0,0,0.25);
  }
  header .head-text { flex: 1; text-align: center; padding-right: 64px; }
  header h1 { font-size: 21px; font-weight: 700; }
  header .clock { font-size: 13px; opacity: 0.9; margin-top: 3px; }
  @media (max-width: 430px) {
    header .head-text { padding-right: 0; text-align: left; }
    header h1 { font-size: 18px; }
  }

  /* ── Kaksirivinen yläpalkki ── */
  .day-tabs {
    display: flex;
    background: var(--darkred);
  }
  .day-tab {
    flex: 1;
    padding: 11px 2px;
    text-align: center;
    color: rgba(255,255,255,0.65);
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    border: none;
    background: transparent;
    border-bottom: 3px solid transparent;
    transition: all .15s;
    line-height: 1.25;
  }
  .day-tab.active {
    color: #fff;
    border-bottom-color: #fff;
    background: rgba(255,255,255,0.08);
  }
  .day-tab .tab-weekday { display: block; font-size: 13px; }
  .day-tab .tab-date { display: block; font-size: 11px; opacity: 0.85; }
  .day-tab .today-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: #FFD24A;
    border-radius: 50%;
    margin-left: 4px;
    vertical-align: middle;
  }

  .info-tabs {
    display: flex;
    background: #7E1111;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .info-tabs::-webkit-scrollbar { display: none; }
  .info-tab {
    flex: 1 0 auto;
    white-space: nowrap;
    padding: 10px 14px;
    text-align: center;
    color: rgba(255,255,255,0.7);
    font-weight: 600;
    font-size: 13.5px;
    cursor: pointer;
    border: none;
    background: transparent;
    border-bottom: 3px solid transparent;
    transition: all .15s;
  }
  .info-tab.active {
    color: #fff;
    border-bottom-color: #fff;
    background: rgba(255,255,255,0.08);
  }
  @media (max-width: 430px) {
    .info-tab { font-size: 12px; padding: 10px 10px; }
  }

  main { max-width: 560px; margin: 0 auto; padding: 14px 12px; }

  .next-banner {
    background: var(--now-bg);
    border: 2px solid var(--now-border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 14px;
    display: none;
  }

  /* ── Sääkortti ── */
  .weather-card {
    display: none;
    align-items: center;
    gap: 14px;
    background: linear-gradient(135deg, #2B5FA8, #4A86D4);
    color: #fff;
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 14px;
  }
  .weather-card.visible { display: flex; }
  .weather-card .w-emoji { font-size: 36px; line-height: 1; }
  .weather-card .w-main { flex: 1; }
  .weather-card .w-desc { font-size: 14px; font-weight: 700; }
  .weather-card .w-temp { font-size: 13px; opacity: 0.95; margin-top: 2px; }
  .weather-card .w-extra { font-size: 11.5px; opacity: 0.85; margin-top: 2px; }
  .weather-card .w-updated { font-size: 10px; opacity: 0.7; text-align: right; }
  .next-banner.visible { display: block; }
  .next-banner .nb-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #A87800;
    margin-bottom: 3px;
  }
  .next-banner .nb-title { font-size: 16px; font-weight: 700; }
  .next-banner .nb-sub { font-size: 13px; color: var(--sub); margin-top: 2px; }
  .next-banner .nb-countdown { font-size: 13px; font-weight: 600; color: #A87800; margin-top: 4px; }

  .event {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    transition: opacity .3s;
  }
  .event.past { opacity: 0.45; }
  .event.current {
    border: 2px solid var(--now-border);
    background: var(--now-bg);
    box-shadow: 0 2px 10px rgba(232,168,0,0.2);
  }
  .event.current .badge-now {
    display: inline-block;
    background: var(--now-border);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 6px;
    vertical-align: middle;
    text-transform: uppercase;
  }
  .badge-now { display: none; }

  .ev-icon {
    width: 40px; height: 40px;
    min-width: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 19px;
    color: #fff;
  }
  .ic-red   { background: var(--red); }
  .ic-green { background: var(--green); }
  .ic-navy  { background: var(--navy); }
  .ic-darkred { background: var(--darkred); }
  .ic-blue  { background: #333399; }

  .ev-body { flex: 1; }
  .ev-time { font-size: 12px; font-weight: 700; color: var(--red); margin-bottom: 1px; }
  .ev-title { font-size: 15px; font-weight: 700; line-height: 1.35; }
  .ev-title.accent { color: var(--red); }
  .ev-sub { font-size: 12.5px; color: var(--sub); margin-top: 3px; line-height: 1.45; }

  a.maplink {
    color: var(--red);
    font-weight: 600;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  a.maplink:active { opacity: 0.7; }

  .addr-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .addr-card .ev-icon { font-size: 18px; }
  .addr-card h3 { font-size: 15px; color: var(--red); margin-bottom: 3px; }
  .addr-card p { font-size: 13px; color: var(--sub); line-height: 1.55; }

  footer {
    text-align: center;
    font-size: 11px;
    color: #AAA;
    margin-top: 24px;
  }

async function fetchWeather() {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${WEATHER_LAT}&longitude=${WEATHER_LON}` +
      `&hourly=temperature_2m,weather_code,precipitation_probability,wind_speed_10m` +
      `&wind_speed_unit=ms&timezone=Europe%2FHelsinki&forecast_days=16`;
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    weatherData = await res.json();
    weatherData._fetched = new Date();
    renderWeather();
    if (getCurrentTab() === WEATHER_TAB) renderEvents();
  } catch (err) {
    console.warn("Sään haku epäonnistui:", err);
    weatherData = null;
    renderWeather();
    if (getCurrentTab() === WEATHER_TAB) renderEvents();
  }
}

const MENU_TAB = DAYS.length;
const ADDR_TAB = DAYS.length + 1;
const CONTACTS_TAB = DAYS.length + 2;
const WEATHER_TAB = DAYS.length + 3;
const TALKOOT_TAB = DAYS.length + 4;

let selectedTab = null;

function nowFi() {
  return new Date(new Date().toLocaleString("en-US", { timeZone: "Europe/Helsinki" }));
}

function todayKey() {
  const n = nowFi();
  return n.getFullYear() + "-" + String(n.getMonth()+1).padStart(2,"0") + "-" + String(n.getDate()).padStart(2,"0");
}

function minutesNow() {
  const n = nowFi();
  return n.getHours()*60 + n.getMinutes();
}

function toMin(hhmm) {
  if (!hhmm) return null;
  const [h, m] = hhmm.split(":").map(Number);
  return h*60 + m;
}

function getAutoDayIndex() {
  const tk = todayKey();
  const idx = DAYS.findIndex(d => d.key === tk);
  if (idx >= 0) return idx;
  return tk < DAYS[0].key ? 0 : DAYS.length - 1;
}

function getCurrentTab() {
  return selectedTab !== null ? selectedTab : getAutoDayIndex();
}

function computeStatuses(day) {
  const isToday = day.key === todayKey();
  if (!isToday) {
    return todayKey() > day.key ? day.events.map(() => "past") : day.events.map(() => "");
  }
  const now = minutesNow();
  const evs = day.events;
  const statuses = evs.map(() => "");

  evs.forEach((e, i) => {
    if (e.time) {
      const start = toMin(e.time);
      const end = e.endTime ? toMin(e.endTime) : start + 60;
      if (now >= end) statuses[i] = "past";
      else if (now >= start) statuses[i] = "current";
      else statuses[i] = "future";
    }
  });
  for (let i = 0; i < evs.length; i++) {
    if (!evs[i].time) {
      let next = null;
      for (let j = i+1; j < evs.length; j++) if (evs[j].time) { next = statuses[j]; break; }
      if (next === "past" || next === "current") statuses[i] = "past";
      else statuses[i] = "";
    }
  }
  return statuses;
}

function findNextEvent(day, statuses) {
  if (day.key !== todayKey()) return null;
  let best = null;
  day.events.forEach((e, i) => {
    if (e.time && statuses[i] === "future") {
      if (best === null || toMin(e.time) < toMin(day.events[best].time)) best = i;
    }
  });
  return best;
}

function renderWeatherTab() {
  document.getElementById("nextBanner").classList.remove("visible");
  document.getElementById("weatherCard").classList.remove("visible");
  const list = document.getElementById("eventList");
  list.innerHTML = "";

  if (!weatherData || !weatherData.hourly) {
    const p = document.createElement("p");
    p.style.cssText = "font-size:14px;color:var(--sub);text-align:center;margin-top:20px;";
    p.innerHTML = "Sääennustetta haetaan… Jos tämä viesti ei katoa, ennustepalveluun ei juuri nyt saada yhteyttä.";
    list.appendChild(p);
    return;
  }

  const H = weatherData.hourly;
  const tk = todayKey();
  const nowH = nowFi().getHours();
  const campKeys = DAYS.map(d => d.key);
  const wdNames = ["Su","Ma","Ti","Ke","To","Pe","La"];
  const SHOW_HOURS = [0, 3, 6, 9, 12, 15, 18, 21];

  // Ryhmittele tunnit päivittäin
  const byDay = {};
  H.time.forEach((t, i) => {
    const [date, hm] = t.split("T");
    const hour = parseInt(hm.slice(0, 2));
    if (!SHOW_HOURS.includes(hour)) return;
    if (date === tk && hour < nowH - 2) return; // piilota jo menneet tunnit tältä päivältä
    if (date < tk) return;
    (byDay[date] = byDay[date] || []).push({
      hour,
      temp: Math.round(H.temperature_2m[i]),
      code: H.weather_code[i],
      rain: H.precipitation_probability[i],
      wind: Math.round(H.wind_speed_10m[i]),
    });
  });

  // Otsikko + päivitysaika
  const f = weatherData._fetched;
  const head = document.createElement("p");
  head.style.cssText = "font-size:12px;color:var(--sub);margin:2px 4px 10px;";
  head.textContent = `Sääennuste · Liperi — päivitetty ${String(f.getHours()).padStart(2,"0")}:${String(f.getMinutes()).padStart(2,"0")} (Open-Meteo)`;
  list.appendChild(head);

  Object.keys(byDay).sort().forEach(date => {
    const hours = byDay[date];
    if (hours.length === 0) return;

    const d = new Date(date + "T12:00:00");
    const isCamp = campKeys.includes(date);
    const isToday = date === tk;
    const label = `${wdNames[d.getDay()]} ${d.getDate()}.${d.getMonth()+1}.`;

    const card = document.createElement("div");
    card.style.cssText = "background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 0 6px;margin-bottom:10px;" +
      (isCamp ? "border:2px solid var(--red);" : "");

    const hdr = document.createElement("div");
    hdr.style.cssText = "font-size:14px;font-weight:700;color:var(--text);padding:0 14px 6px;";
    hdr.innerHTML = label
      + (isToday ? ' <span style="background:var(--now-border);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;vertical-align:middle;text-transform:uppercase;">Tänään</span>' : "")
      + (isCamp ? ' <span style="background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;vertical-align:middle;text-transform:uppercase;">⚾ Leiripäivä</span>' : "");
    card.appendChild(hdr);

    const strip = document.createElement("div");
    strip.style.cssText = "display:flex;overflow-x:auto;gap:2px;padding:0 8px;-webkit-overflow-scrolling:touch;";
    hours.forEach(h => {
      const [emoji] = WMO[h.code] || ["🌡️"];
      const cell = document.createElement("div");
      cell.style.cssText = "min-width:56px;text-align:center;padding:4px 2px;";
      cell.innerHTML = `
        <div style="font-size:11px;font-weight:700;color:var(--sub);">${String(h.hour).padStart(2,"0")}</div>
        <div style="font-size:22px;line-height:1.3;">${emoji}</div>
        <div style="font-size:14px;font-weight:700;color:var(--red);">${h.temp}°</div>
        <div style="font-size:10.5px;color:#2B5FA8;">💧 ${h.rain}%</div>
        <div style="font-size:10.5px;color:var(--sub);">${h.wind} m/s</div>`;
      strip.appendChild(cell);
    });
    card.appendChild(strip);
    list.appendChild(card);
  });
}

function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

// Yhdistää ottelun pvm:n (esim. "28.7.") leiripäivään DAYS-listalta.
// Muuntaa pvm:n siistiksi muotoon "d.m" — hyväksyy sekä "29.7." / "29.7" että
// raa'an JS Date -merkkijonon (esim. "Wed Jul 29 2026 03:00:00 GMT+0300 ...").
function normalizePvm(pvm) {
  let s = String(pvm).trim();
  let m = s.match(/^(\d{1,2})\.(\d{1,2})\.?$/);
  if (m) return m[1] + "." + m[2];
  const d = new Date(s);
  if (!isNaN(d.getTime())) return d.getDate() + "." + (d.getMonth() + 1);
  return s;
}

function gameDayInfo(pvm) {
  const norm = normalizePvm(pvm);
  for (let i = 0; i < DAYS.length; i++) {
    if (DAYS[i].date.replace(/\.+$/, "") === norm) {
      return { idx: i, key: DAYS[i].key, label: DAYS[i].label, date: DAYS[i].date };
    }
  }
  return { idx: 99, key: null, label: "", date: norm };
}

async function fetchGames() {
  try {
    const res = await fetch(TALKOOT_API + "?t=" + Date.now(), { method: "GET", cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    gamesData = Array.isArray(data.games) ? data.games : [];
    gamesLocked = !!data.locked;
    gamesError = false;
  } catch (err) {
    console.warn("Otteluiden haku epäonnistui:", err);
    gamesError = true; // säilytä mahdollinen vanha data, näytä silti virhe jos tyhjä
  }
  const ct = getCurrentTab();
  if (ct === TALKOOT_TAB || (ct >= 0 && ct < DAYS.length)) renderEvents();
}

async function postTalkoo(id, role, name) {
  if (gamesLocked) { await fetchGames(); return; }
  saving = { id, role };
  if (getCurrentTab() === TALKOOT_TAB) renderTalkootTab();
  try {
    await fetch(TALKOOT_API, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" }, // välttää CORS-esitarkistuksen
      body: JSON.stringify({ id: id, role: role, name: name }),
    });
  } catch (err) {
    console.warn("Tallennus epäonnistui:", err);
  }
  await new Promise(r => setTimeout(r, 400));
  saving = null;
  await fetchGames();
}

function findGameRole(id, role) {
  const g = (gamesData || []).find(x => x.id === id);
  return g ? { game: g, name: g.roles[role] || "" } : null;
}

function startTalkooEdit(id, role) {
  if (gamesLocked) return;
  const fr = findGameRole(id, role);
  editing = { id: id, role: role, value: fr ? fr.name : "" };
  renderTalkootTab();
  setTimeout(() => {
    const el = document.getElementById("talkooInput");
    if (el) { el.focus(); try { el.setSelectionRange(el.value.length, el.value.length); } catch (e) {} }
  }, 0);
}

function cancelTalkooEdit() { editing = null; renderTalkootTab(); }

async function saveTalkooEdit() {
  const el = document.getElementById("talkooInput");
  if (!el || !editing) return;
  const newName = el.value.trim();
  if (!newName) { cancelTalkooEdit(); return; }
  const fr = findGameRole(editing.id, editing.role);
  const oldName = fr ? fr.name : "";
  if (oldName && oldName !== newName &&
      !confirm("Korvataanko " + oldName + " nimellä " + newName + "?")) return;
  const id = editing.id, role = editing.role;
  editing = null;
  await postTalkoo(id, role, newName);
}

async function removeTalkooName(id, role) {
  const fr = findGameRole(id, role);
  const name = fr ? fr.name : "";
  if (name && !confirm("Poistetaanko " + name + " tästä vuorosta?")) return;
  editing = null;
  await postTalkoo(id, role, "");
}

function btnStyle(filled) {
  return filled
    ? "font-size:12px;font-weight:700;color:#fff;background:var(--red);border:1px solid var(--red);border-radius:8px;padding:3px 11px;margin-left:8px;cursor:pointer;"
    : "font-size:12px;font-weight:600;color:var(--red);background:#fff;border:1px solid var(--red);border-radius:8px;padding:3px 10px;margin-left:6px;cursor:pointer;";
}

function roleRowHtml(game, def) {
  const id = game.id, key = def.key;
  const name = game.roles[key] || "";
  const isEditing = editing && editing.id === id && editing.role === key;
  const isSaving = saving && saving.id === id && saving.role === key;

  let body;
  if (gamesLocked) {
    body = name ? esc(name) : `<span style="color:var(--sub);">Avoin</span>`;
  } else if (isSaving) {
    body = `<span style="color:var(--sub);">⏳ Tallennetaan…</span>`;
  } else if (isEditing) {
    body = `<input id="talkooInput" type="text" maxlength="60" value="${esc(editing.value)}" placeholder="Nimesi"
              style="font-size:14px;padding:4px 8px;border:1px solid var(--red);border-radius:8px;width:140px;"
              onkeydown="if(event.key==='Enter'){event.preventDefault();saveTalkooEdit();}if(event.key==='Escape'){cancelTalkooEdit();}">
            <button style="${btnStyle(true)}" onclick="saveTalkooEdit()">Tallenna</button>
            <button style="${btnStyle(false)}" onclick="cancelTalkooEdit()">Peruuta</button>`;
  } else if (name) {
    body = `${esc(name)}
            <button style="${btnStyle(false)}" onclick="startTalkooEdit('${id}','${key}')">Vaihda</button>
            <button style="${btnStyle(false)}" onclick="removeTalkooName('${id}','${key}')">Poista</button>`;
  } else {
    body = `<span style="color:var(--red);font-weight:700;">❗ Avoin</span>
            <button style="${btnStyle(true)}" onclick="startTalkooEdit('${id}','${key}')">Ilmoittaudu</button>`;
  }
  return `<div style="margin-top:6px;display:flex;align-items:center;flex-wrap:wrap;gap:2px 0;">
            <strong style="margin-right:6px;">${def.label}:</strong> ${body}
          </div>`;
}

function renderTalkootTab() {
  document.getElementById("nextBanner").classList.remove("visible");
  document.getElementById("weatherCard").classList.remove("visible");
  const list = document.getElementById("eventList");
  list.innerHTML = "";
  const tk = todayKey();

  // ── Avoimet vuorot ──
  let openShifts = 0;
  (gamesData || []).forEach(g => {
    (g.home ? HOME_ROLE_DEFS : AWAY_ROLE_DEFS).forEach(def => {
      if (!(g.roles[def.key] || "").trim()) openShifts++;
    });
  });
  const openRides = KYYDIT.reduce((a, k) => a + k.roles.length, 0);

  // ── Yhteenvetopalkki ──
  const summary = document.createElement("div");
  if (gamesData === null && gamesError) {
    summary.style.cssText = "background:#FCEBEB;border:2px solid var(--red);border-radius:12px;padding:10px 14px;margin-bottom:14px;font-size:13.5px;font-weight:600;color:var(--darkred);";
    summary.innerHTML = "⚠️ Otteluiden haku ei juuri nyt onnistu. Yritetään uudelleen automaattisesti — tarkista verkkoyhteys tai päivitä sivu.";
  } else if (gamesData === null) {
    summary.style.cssText = "background:var(--now-bg);border:2px solid var(--now-border);border-radius:12px;padding:10px 14px;margin-bottom:14px;font-size:14px;font-weight:600;color:#A87800;";
    summary.innerHTML = "Haetaan otteluita…";
  } else {
    const ok = openShifts === 0;
    summary.style.cssText = ok
      ? "background:#E8F5EC;border:2px solid var(--green);border-radius:12px;padding:10px 14px;margin-bottom:14px;font-size:14px;font-weight:700;color:var(--green);"
      : "background:var(--now-bg);border:2px solid var(--now-border);border-radius:12px;padding:10px 14px;margin-bottom:14px;font-size:14px;font-weight:700;color:#A87800;";
    summary.innerHTML = ok
      ? "✅ Kaikki ottelutalkoot täytetty — kiitos!<br><span style=\"font-size:12px;font-weight:600;color:var(--sub);\">🚗 Kyydit sovitaan valmentajan kanssa.</span>"
      : `🙋 Avoimia ottelutalkoita: ${openShifts}` + (gamesLocked
          ? `<br><span style="font-size:12px;font-weight:600;color:var(--sub);">🚗 Kyydit sovitaan valmentajan kanssa.</span>`
          : `<br><span style="font-size:12px;font-weight:600;">Ilmoittaudu painamalla "Ilmoittaudu" pelin kohdalla. 🚗 Kyydit sovitaan valmentajan kanssa.</span>`);
  }
  list.appendChild(summary);

  if (gamesLocked) {
    const lk = document.createElement("div");
    lk.style.cssText = "background:#EDEEF3;border:2px solid var(--navy);border-radius:12px;padding:10px 14px;margin-bottom:14px;font-size:14px;font-weight:700;color:var(--navy);";
    lk.innerHTML = "🔒 Talkoolista on lukittu. Vuoroihin ei voi enää tehdä muutoksia sivustolla.";
    list.appendChild(lk);
  }

  // ── Ottelut ryhmiteltynä päivittäin ──
  if (gamesData && gamesData.length) {
    const groups = {};
    gamesData.forEach(g => {
      const di = gameDayInfo(g.pvm);
      const k = di.key || ("x" + di.date);
      (groups[k] = groups[k] || { di: di, games: [] }).games.push(g);
    });
    Object.keys(groups)
      .sort((a, b) => groups[a].di.idx - groups[b].di.idx || (groups[a].di.date > groups[b].di.date ? 1 : -1))
      .forEach(k => {
        const grp = groups[k];
        const hdr = document.createElement("div");
        hdr.style.cssText = "font-size:16px;font-weight:700;color:var(--red);margin:14px 4px 8px;";
        const dayLabel = grp.di.label ? `${grp.di.label} ${grp.di.date}` : grp.di.date;
        hdr.innerHTML = dayLabel
          + (grp.di.key === tk ? ' <span style="background:var(--now-border);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;vertical-align:middle;text-transform:uppercase;">Tänään</span>' : "");
        list.appendChild(hdr);

        grp.games
          .slice()
          .sort((a, b) => (a.klo || "").localeCompare(b.klo || "") || (a.joukkueet || "").localeCompare(b.joukkueet || ""))
          .forEach(g => {
            const defs = g.home ? HOME_ROLE_DEFS : AWAY_ROLE_DEFS;
            const rolesHtml = defs.map(def => roleRowHtml(g, def)).join("");
            const meta = [g.klo, g.kentta].filter(Boolean).join(" · ");
            const div = document.createElement("div");
            div.className = "event";
            div.innerHTML = `
              <div class="ev-icon ic-red">⚾</div>
              <div class="ev-body">
                ${meta ? `<div class="ev-time">${esc(meta)}</div>` : ""}
                <div class="ev-title">${esc(g.joukkueet)}</div>
                <div class="ev-sub">${rolesHtml}</div>
              </div>`;
            list.appendChild(div);
          });
      });
  } else if (gamesData && gamesData.length === 0) {
    const p = document.createElement("p");
    p.style.cssText = "font-size:13.5px;color:var(--sub);margin:4px 4px 10px;";
    p.innerHTML = "<em>Otteluita ei ole vielä lisätty taulukkoon. Ne ilmestyvät tähän automaattisesti.</em>";
    list.appendChild(p);
  }

  // ── Kyydit (erillinen osio) ──
  const kyytiHdr = document.createElement("div");
  kyytiHdr.style.cssText = "font-size:16px;font-weight:700;color:var(--navy);margin:20px 4px 8px;";
  kyytiHdr.innerHTML = "🚗 Kyydit";
  list.appendChild(kyytiHdr);

  const wdNames = ["Su","Ma","Ti","Ke","To","Pe","La"];
  let lastKey = null;
  KYYDIT.slice()
    .sort((a, b) => a.key === b.key ? a.time.localeCompare(b.time) : a.key.localeCompare(b.key))
    .forEach(t => {
      if (t.key !== lastKey) {
        lastKey = t.key;
        const d = new Date(t.key + "T12:00:00");
        const hdr = document.createElement("div");
        hdr.style.cssText = "font-size:13px;font-weight:700;color:var(--sub);margin:10px 4px 4px;";
        hdr.innerHTML = `${wdNames[d.getDay()]} ${d.getDate()}.${d.getMonth()+1}.`
          + (t.key === tk ? ' <span style="background:var(--now-border);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;vertical-align:middle;text-transform:uppercase;">Tänään</span>' : "");
        list.appendChild(hdr);
      }
      const rolesHtml = t.roles.map(r =>
        `<div style="margin-top:3px;"><strong>${r}:</strong> <span style="color:var(--red);font-weight:700;">❗ Avoin — ilmoittaudu valmentajalle</span></div>`
      ).join("");
      const div = document.createElement("div");
      div.className = "event";
      div.innerHTML = `
        <div class="ev-icon ic-blue">🚗</div>
        <div class="ev-body">
          <div class="ev-time">${t.time}</div>
          <div class="ev-title">${t.title}</div>
          ${t.place ? `<div class="ev-sub">${t.place}</div>` : ""}
          <div class="ev-sub">${rolesHtml}</div>
        </div>`;
      list.appendChild(div);
    });
}

function addMin(hhmm, add) {
  const t = toMin(hhmm);
  if (t == null) return null;
  const x = Math.min(t + add, 23 * 60 + 59);
  return String(Math.floor(x / 60)).padStart(2, "0") + ":" + String(x % 60).padStart(2, "0");
}

function renderEvents() {
  const tab = getCurrentTab();
  if (tab === ADDR_TAB) { renderAddressesTab(); return; }
  if (tab === MENU_TAB) { renderMenuTab(); return; }
  if (tab === CONTACTS_TAB) { renderContactsTab(); return; }
  if (tab === WEATHER_TAB) { renderWeatherTab(); return; }
  if (tab === TALKOOT_TAB) { renderTalkootTab(); return; }

  const baseDay = DAYS[tab];

  // Yhdistä Sheetin ottelut tämän päivän aikajanalle
  const gameEvents = (gamesData || [])
    .filter(g => gameDayInfo(g.pvm).key === baseDay.key)
    .map(g => {
      const defs = g.home ? HOME_ROLE_DEFS : AWAY_ROLE_DEFS;
      const roleLines = defs.map(d => {
        const nm = (g.roles[d.key] || "").trim();
        return `<div style="margin-top:2px;"><strong>${d.label}:</strong> `
          + (nm ? esc(nm) : `<span style="color:var(--red);font-weight:700;">Avoin</span>`)
          + `</div>`;
      }).join("");
      const fieldLine = g.kentta ? `<div>${esc(g.kentta)}</div>` : "";
      return {
        time: g.klo,
        endTime: addMin(g.klo, 60),
        icon: "⚾",
        color: "ic-red",
        title: esc(g.joukkueet),
        sub: fieldLine + roleLines,
      };
    });
  // Säilytä yleiset "Otteluita"-merkinnät (alustava aikataulu) oikeiden otteluiden rinnalla
  const baseEvents = baseDay.events;
  const mergedEvents = baseEvents.concat(gameEvents)
    .sort((a, b) => {
      const ta = toMin(a.time), tb = toMin(b.time);
      return (ta == null ? 1e9 : ta) - (tb == null ? 1e9 : tb);
    });
  const day = Object.assign({}, baseDay, { events: mergedEvents });

  const statuses = computeStatuses(day);
  const nextIdx = findNextEvent(day, statuses);

  const banner = document.getElementById("nextBanner");
  if (nextIdx !== null) {
    const e = day.events[nextIdx];
    document.getElementById("nbTitle").textContent = (e.time ? e.time + " — " : "") + e.title;
    document.getElementById("nbSub").innerHTML = e.sub || "";
    const mins = toMin(e.time) - minutesNow();
    const h = Math.floor(mins/60), m = mins % 60;
    document.getElementById("nbCountdown").textContent =
      mins <= 0 ? "Alkaa nyt!" :
      h > 0 ? `Alkaa ${h} h ${m} min kuluttua` : `Alkaa ${m} min kuluttua`;
    banner.classList.add("visible");
  } else {
    banner.classList.remove("visible");
  }

  const list = document.getElementById("eventList");
  list.innerHTML = "";
  day.events.forEach((e, i) => {
    const div = document.createElement("div");
    div.className = "event " + (statuses[i] || "");
    div.innerHTML = `
      <div class="ev-icon ${e.color}">${e.icon}</div>
      <div class="ev-body">
        ${e.time ? `<div class="ev-time">${e.time}</div>` : ""}
        <div class="ev-title ${e.accent ? "accent" : ""}">${e.title}<span class="badge-now">Nyt</span></div>
        ${e.sub ? `<div class="ev-sub">${e.sub}</div>` : ""}
      </div>`;
    list.appendChild(div);
  });
}

function renderClock() {
  const n = nowFi();
  const days = ["su","ma","ti","ke","to","pe","la"];
  document.getElementById("clock").textContent =
    `${days[n.getDay()]} ${n.getDate()}.${n.getMonth()+1}. klo ${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`;
}

function render() {
  renderTabs();
  renderEvents();
  renderWeather();
  renderClock();
}

render();
fetchWeather(); // hae sää heti sivun avautuessa
fetchGames();   // hae ottelut ja talkoot heti
setInterval(fetchWeather, 60 * 60 * 1000); // päivitä sää tunnin välein
setInterval(() => {
  // päivitä ottelut/talkoot säännöllisesti, mutta ei kesken kirjaamisen
  const t = getCurrentTab();
  if (!editing && !saving && (t === TALKOOT_TAB || (t >= 0 && t < DAYS.length))) fetchGames();
}, 45000);
setInterval(() => {
  if (!INFO_TABS.includes(getCurrentTab())) render();
  else renderClock();
}, 30000);
setInterval(renderClock, 1000);
</script>
